spring.application.name=backend
server.port=${SERVER_PORT:8090}

# PostgreSQL Database Configuration (Portainer)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://192.168.31.229:15432/helphealth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SQLite Database Location for the Export Routine
helphealth.sqlite.db-path=${HELPHEALTH_SQLITE_DB_PATH:./anvisa_app_database.db}

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
